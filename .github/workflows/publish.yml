name: Publish Package

on:
  push:
    branches: ["main"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11.x — needed for npm Trusted Publishing
      # (>= 11.5.1). Avoids the broken in-place `npm i -g npm@latest` on the
      # Node 22 image.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run -r build
      - run: pnpm run -r test

      - name: Publish
        run: pnpm --filter='./packages/*' publish --access public --no-git-checks --provenance
