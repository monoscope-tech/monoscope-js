name: Publish Package

on:
  push:
    branches: ["main"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # Trusted publishing requires npm >= 11.5.1.
      # --force avoids the in-place self-upgrade MODULE_NOT_FOUND on the
      # Node 22 runner image (npm starts removing its own files mid-install).
      - run: npm install -g npm@latest --force

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run -r build
      - run: pnpm run -r test

      - name: Publish
        run: pnpm --filter='./packages/*' publish --access public --no-git-checks --provenance
